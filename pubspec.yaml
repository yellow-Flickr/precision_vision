name: precision_vision
description: "Real-time on-device object detection powered by TensorFlow Lite (YOLOv8 & MobileNet)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  camera: ^0.12.0+1
  flutter:
    sdk: flutter
  flutter_litert: ^2.5.2
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  image: ^4.8.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_lint: ^3.1.3
  flutter_launcher_icons: "^0.14.4"
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  adaptive_icon_background: "#051324"
  adaptive_icon_foreground: "assets/imgs/launcher_icon.png"
  image_path: "assets/imgs/launcher_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter_native_splash:
  color: "#051324"  
  #color_dark: "#042a49"
  image:                assets/imgs/launcher_icon.png
  #image_dark:          assets/splash-invert.png
  fullscreen: true                # default false
  #! ANDROID 12+ configuration:
  android_12:
    color: "#051324"
    image: assets/imgs/launcher_icon.png    
    icon_background_color: "#051324"
 
flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/models/
    - assets/labels/
    - assets/imgs/
    - assets/imgs/launcher_icon.png
    - assets/models/yolov8.tflite
    - assets/labels/labels.txt