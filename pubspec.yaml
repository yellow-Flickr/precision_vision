name: precision_vision
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  camera: ^0.12.0+1
  flutter:
    sdk: flutter
  flutter_litert: ^2.5.2
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  image: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_lint: ^3.1.3
  flutter_launcher_icons: "^0.14.4"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  adaptive_icon_background: "#051324"
  adaptive_icon_foreground: "assets/imgs/launcher_icon.png"
  image_path: "assets/imgs/launcher_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/models/
    - assets/labels/
    - assets/imgs/
    - assets/imgs/launcher_icon.png
    - assets/models/yolov8.tflite
    - assets/labels/labels.txt